<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" />
    <title>Threadly</title>
    <script>
      (function () {
        var storageKey = 'vite-ui-theme';
        var fallbackTheme = 'system';
        var root = document.documentElement;
        var storedTheme = null;

        try {
          storedTheme = localStorage.getItem(storageKey);
        } catch (_error) {
          storedTheme = null;
        }

        var theme =
          storedTheme === 'light' || storedTheme === 'dark' || storedTheme === 'system'
            ? storedTheme
            : fallbackTheme;

        var prefersDark =
          window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var className = theme === 'dark' || (theme === 'system' && prefersDark)
          ? 'dark'
          : 'light';

        root.classList.remove('light', 'dark');
        root.classList.add(className);
        root.dataset.themePreference = theme;
        root.style.colorScheme = className;

        var themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) {
          themeColorMeta.setAttribute('content', className === 'dark' ? '#0a0a0a' : '#ffffff');
        }
      })();
    </script>
    <!-- Google Fonts: Playfair Display for elegant product titles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <div id="overlay-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
